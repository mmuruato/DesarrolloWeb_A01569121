<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Crear cuenta</h1>
    <p>Registra tus datos para poder iniciar sesión</p>

    <form id="registerForm">
      <label>
        Nombre
        <input type="text" id="nombre" placeholder="tu nombre" required />
      </label>

      <label>
        Correo
        <input type="email" id="correo" placeholder="tu correo" required />
      </label>

      <label>
        Contraseña
        <input type="password" id="contrasena" placeholder="crea una contraseña" required />
      </label>

      <p id="mensaje" style="color:red; display:none;"></p>

      <button type="submit">Registrarse</button>
    </form>

    <a class="back" href="index.html">← Volver a iniciar sesión</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://wuuoyaikzqoudzzcuybq.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_C5ku1lEJS94CZFdHY1clzA_TIwGg4l4'

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const nombre     = document.getElementById('nombre').value.trim()
      const correo     = document.getElementById('correo').value.trim()
      const contrasena = document.getElementById('contrasena').value
      const mensaje    = document.getElementById('mensaje')

      // Verificar si el correo ya existe
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?correo=eq.${encodeURIComponent(correo)}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      })
      const existing = await checkRes.json()

      if (existing.length > 0) {
        mensaje.textContent = 'Este correo ya está registrado.'
        mensaje.style.display = 'block'
        return
      }

      // Guardar usuario
      const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ nombre, correo, "contraseña": contrasena })
      })

      if (res.ok) {
        alert('¡Cuenta creada! Ya puedes iniciar sesión.')
        window.location.href = 'index.html'
      } else {
        mensaje.textContent = 'Hubo un error. Intenta de nuevo.'
        mensaje.style.display = 'block'
      }
    })
  </script>
</body>
</html>
